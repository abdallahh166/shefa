name: Backup Verification

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0" # weekly Sunday 03:00 UTC

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Install Postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Dump production database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "SUPABASE_DB_URL is not configured" && exit 1
          fi
          pg_dump "$SUPABASE_DB_URL" --no-owner --no-privileges -f backup.sql

      - name: Restore into temp database
        env:
          PGPASSWORD: postgres
        run: |
          psql -v ON_ERROR_STOP=1 -h localhost -U postgres -d postgres -f backup.sql

      - name: Run backup smoke checks
        env:
          PGPASSWORD: postgres
        run: |
          psql -v ON_ERROR_STOP=1 -h localhost -U postgres -d postgres -f scripts/backup-smoke.sql
