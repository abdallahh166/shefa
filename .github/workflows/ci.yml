name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "package-lock.json missing; falling back to npm install"
            npm install
          fi

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Start Supabase
        run: supabase start

      - name: Database tests
        run: supabase test db

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        if: ${{ secrets.E2E_SUPER_ADMIN_EMAIL != '' && secrets.E2E_SUPER_ADMIN_PASSWORD != '' && secrets.E2E_ADMIN_EMAIL != '' && secrets.E2E_ADMIN_PASSWORD != '' && secrets.E2E_CLINIC_SLUG != '' }}
        run: npx playwright install --with-deps chromium

      - name: E2E super-admin flows
        if: ${{ secrets.E2E_SUPER_ADMIN_EMAIL != '' && secrets.E2E_SUPER_ADMIN_PASSWORD != '' && secrets.E2E_ADMIN_EMAIL != '' && secrets.E2E_ADMIN_PASSWORD != '' && secrets.E2E_CLINIC_SLUG != '' }}
        env:
          E2E_SUPER_ADMIN_EMAIL: ${{ secrets.E2E_SUPER_ADMIN_EMAIL }}
          E2E_SUPER_ADMIN_PASSWORD: ${{ secrets.E2E_SUPER_ADMIN_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_CLINIC_SLUG: ${{ secrets.E2E_CLINIC_SLUG }}
          E2E_DOCTOR_NAME: ${{ secrets.E2E_DOCTOR_NAME }}
        run: npx playwright test tests/e2e/super-admin-pricing.spec.ts tests/e2e/super-admin-tenant-lifecycle.spec.ts tests/e2e/super-admin-module-gating.spec.ts
